<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e8f3ea;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      color: #14532d;
      font-size: 28px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 15px;
      margin-bottom: 14px;
      box-sizing: border-box;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary {
      background: #166534;
      color: #fff;
      width: 100%;
    }

    .message-box {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 14px;
      line-height: 1.8;
      font-size: 14px;
      border: 1px solid transparent;
    }

    .message-box.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .message-box.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border-color: #bbf7d0;
    }

    .muted {
      color: #6b7280;
      margin-top: 12px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>تسجيل الدخول</h1>

    <div id="loginMessage" class="message-box"></div>

    <form id="loginForm">
      <label>البريد الإلكتروني</label>
      <input id="loginEmail" type="email" required />

      <label>كلمة المرور</label>
      <input id="loginPassword" type="password" required />

      <button class="btn-primary" type="submit">دخول</button>
    </form>

    <div class="muted">بعد تسجيل الدخول سيتم إعادتك تلقائيًا إلى الصفحة الرئيسية</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://uekovggqcsnbwpnbibjz.supabase.co";
    const supabaseKey = "sb_publishable_i0vQ90zclZwHaSFCzHOOfw_Gsfkld9f";
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    function showMessage(type, message) {
      const box = document.getElementById("loginMessage");
      box.className = `message-box ${type}`;
      box.textContent = message;
      box.style.display = "block";
    }

    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get("return") || "index.html";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        console.log(error);
        showMessage("error", "فشل تسجيل الدخول، تأكدي من البريد وكلمة المرور");
        return;
      }

      showMessage("success", "تم تسجيل الدخول بنجاح، جاري التحويل");
      setTimeout(() => {
        window.location.href = returnTo;
      }, 700);
    });
  </script>
</body>
</html>
